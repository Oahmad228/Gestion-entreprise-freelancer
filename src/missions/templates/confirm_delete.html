{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Confirmer la suppression</h2>
    <p class="mb-6">Êtes-vous sûr de vouloir supprimer "{{ object }}"?</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="flex justify-between">
            <a href="{{ object.get_absolute_url }}" class="bg-gray-500 text-white px-4 py-2 rounded">Annuler</a>
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                Supprimer définitivement
            </button>
        </div>
    </form>
</div>
{% endblock %}
