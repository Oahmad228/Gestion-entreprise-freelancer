{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6">Postuler à la mission</h2>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Message de motivation</label>
            <textarea name="message" class="w-full px-3 py-2 border rounded" required></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">
            Envoyer ma candidature
        </button>
    </form>
</div>
{% endblock %}
