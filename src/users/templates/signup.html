{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Inscription</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Champs communs -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Nom d'utilisateur*</label>
            <input type="text" name="username" class="w-full px-3 py-2 border rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Email*</label>
            <input type="email" name="email" class="w-full px-3 py-2 border rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Mot de passe*</label>
            <input type="password" name="password1" class="w-full px-3 py-2 border rounded" required>
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 mb-2">Confirmation mot de passe*</label>
            <input type="password" name="password2" class="w-full px-3 py-2 border rounded" required>
        </div>

        <!-- Type d'utilisateur -->
        <div class="mb-6">
            <label class="block text-gray-700 mb-2">Vous êtes*</label>
            <div class="flex items-center mb-2">
                <input type="radio" id="freelance" name="user_type" value="FR" required
                       class="mr-2" checked>
                <label for="freelance">Freelance</label>
            </div>
            <div class="flex items-center">
                <input type="radio" id="entreprise" name="user_type" value="EN"
                       class="mr-2">
                <label for="entreprise">Entreprise</label>
            </div>
        </div>

        <!-- Champs conditionnels -->
        <div id="freelance-fields">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Biographie</label>
                <textarea name="bio" class="w-full px-3 py-2 border rounded"></textarea>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Compétences (séparées par des virgules)</label>
                <input type="text" name="competences" class="w-full px-3 py-2 border rounded">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Tarif horaire (€)</label>
                <input type="number" name="tarif_horaire" class="w-full px-3 py-2 border rounded" min="0" step="0.01">
            </div>
        </div>

        <div id="entreprise-fields" class="hidden">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nom de l'entreprise*</label>
                <input type="text" name="nom_entreprise" class="w-full px-3 py-2 border rounded">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Description</label>
                <textarea name="description" class="w-full px-3 py-2 border rounded"></textarea>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Site web</label>
                <input type="url" name="site_web" class="w-full px-3 py-2 border rounded">
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">
            S'inscrire
        </button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const freelanceRadio = document.getElementById('freelance');
    const entrepriseRadio = document.getElementById('entreprise');
    const freelanceFields = document.getElementById('freelance-fields');
    const entrepriseFields = document.getElementById('entreprise-fields');

    function toggleFields() {
        if (freelanceRadio.checked) {
            freelanceFields.classList.remove('hidden');
            entrepriseFields.classList.add('hidden');
        } else {
            freelanceFields.classList.add('hidden');
            entrepriseFields.classList.remove('hidden');
        }
    }

    freelanceRadio.addEventListener('change', toggleFields);
    entrepriseRadio.addEventListener('change', toggleFields);

    // Initial toggle
    toggleFields();
});
</script>
{% endblock %}
